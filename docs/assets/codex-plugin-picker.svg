<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">DeepSeek Forge in the Codex plugin picker</title>
  <desc id="desc">A Codex plugin menu with DeepSeek Forge highlighted.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="soft-blur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
    <linearGradient id="deepseek-icon" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1a7cff"/>
      <stop offset="1" stop-color="#52c7ff"/>
    </linearGradient>
  </defs>

  <rect width="900" height="520" fill="#ffffff"/>

  <g opacity="0.96">
    <text x="40" y="54" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="700" fill="#202124">Use DeepSeek Forge from Codex plugins</text>
    <text x="40" y="92" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" fill="#5f6368">After installation, open the plugin picker and select DeepSeek Forge.</text>
  </g>

  <g filter="url(#shadow)" opacity="0.42">
    <rect x="46" y="176" width="350" height="292" rx="22" fill="#ffffff" stroke="#d9d9df"/>
    <g filter="url(#soft-blur)" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" fill="#202124">
      <text x="96" y="228">Attach files</text>
      <text x="96" y="290">Planning mode</text>
      <text x="96" y="352">Track goal</text>
      <text x="96" y="414" font-weight="700">Plugins</text>
    </g>
    <g filter="url(#soft-blur)" stroke="#d9d9df" stroke-width="1.5">
      <line x1="74" y1="254" x2="365" y2="254"/>
      <line x1="74" y1="378" x2="365" y2="378"/>
    </g>
    <g filter="url(#soft-blur)" fill="none" stroke="#5f6368" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M70 207h16a12 12 0 0 1 0 24H70a12 12 0 0 1 0-24z"/>
      <path d="M72 281h20m-20 14h20m-20 14h20"/>
      <circle cx="82" cy="343" r="12"/>
      <path d="M82 331v-10m0 34v10m12-22h10m-34 0H60"/>
      <circle cx="75" cy="409" r="5"/>
      <circle cx="92" cy="409" r="5"/>
      <circle cx="75" cy="426" r="5"/>
      <circle cx="92" cy="426" r="5"/>
      <path d="M350 404l14 14-14 14"/>
    </g>
    <rect x="308" y="275" width="58" height="32" rx="16" fill="#f1f2f4"/>
    <circle cx="324" cy="291" r="13" fill="#ffffff"/>
    <rect x="308" y="337" width="58" height="32" rx="16" fill="#f1f2f4"/>
    <circle cx="324" cy="353" r="13" fill="#ffffff"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="390" y="112" width="360" height="382" rx="22" fill="#ffffff" stroke="#d9d9df"/>
    <text x="416" y="156" filter="url(#soft-blur)" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="600" fill="#b6b8bd">17 installed plugins</text>

    <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" fill="#202124">
      <g transform="translate(0,0)" filter="url(#soft-blur)" opacity="0.34">
        <rect x="418" y="182" width="28" height="28" rx="7" fill="#68ad5b"/>
        <text x="462" y="205">Spreadsheets</text>
      </g>
      <g transform="translate(0,56)" filter="url(#soft-blur)" opacity="0.34">
        <rect x="418" y="182" width="28" height="28" rx="7" fill="#f2b552"/>
        <text x="462" y="205">Presentations</text>
      </g>
      <g transform="translate(0,112)" filter="url(#soft-blur)" opacity="0.34">
        <rect x="418" y="182" width="28" height="28" rx="7" fill="#73b8ff"/>
        <text x="462" y="205">Browser</text>
      </g>
      <g transform="translate(0,168)" filter="url(#soft-blur)" opacity="0.34">
        <circle cx="432" cy="196" r="15" fill="#4285f4"/>
        <path d="M432 181a15 15 0 0 1 13 7.5h-26A15 15 0 0 1 432 181z" fill="#ea4335"/>
        <path d="M445 188.5A15 15 0 0 1 432 211l13-22.5z" fill="#fbbc04"/>
        <path d="M419 188.5A15 15 0 0 0 432 211l-13-22.5z" fill="#34a853"/>
        <circle cx="432" cy="196" r="7" fill="#ffffff"/>
        <text x="462" y="205">Chrome</text>
      </g>

      <g transform="translate(0,224)">
        <rect x="406" y="170" width="306" height="52" rx="15" fill="#f1f2f4"/>
        <path d="M420 184l24 11-10 7-4 14-10-32z" fill="url(#deepseek-icon)"/>
        <text x="462" y="205" font-weight="700">DeepSeek Forge</text>
      </g>

      <g transform="translate(0,280)" filter="url(#soft-blur)" opacity="0.34">
        <rect x="418" y="182" width="28" height="28" rx="7" fill="#7d78ff"/>
        <text x="462" y="205">Canva</text>
      </g>
      <g transform="translate(0,336)" filter="url(#soft-blur)" opacity="0.34">
        <rect x="418" y="182" width="28" height="28" rx="7" fill="#f24e1e"/>
        <text x="462" y="205">Figma</text>
      </g>
    </g>

    <rect x="722" y="202" width="14" height="256" rx="7" fill="#d9d9df"/>
  </g>

  <rect x="392" y="392" width="322" height="58" fill="none" stroke="#ff1f1f" stroke-width="6"/>
